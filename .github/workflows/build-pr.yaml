name: Build PR

on:
  pull_request:
    types: [ opened, synchronize,reopened,ready_for_review ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/'

env:
  JAVA_VERSION: 18
  IMAGE_TAG: sha-${{ github.event.pull_request.head.sha }}
  TZ: 'Asia/Kolkata'
  GCR_PROJECT_NAME: 'home'
  GCR_REPO_NAME_APP: 'spcsekol/gcp-boot-demo'
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:

  build-app:

    runs-on: ubuntu-latest
    timeout-minutes: 50

    if: ${{ github.event.pull_request.draft == false && contains(github.event.pull_request.labels.*.name, 'build:run') }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup JDK version ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}

      - name: Verify Java version
        run: java -version

      - name: Get current time in milliseconds
        id: current-time-millis
        run: |
          echo "::set-output name=time::$(date +%s%N | cut -b1-13)"
      
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v0.8.0
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Login to GCR
        uses: docker/login-action@v2
        with:
          registry: gcr.io
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
